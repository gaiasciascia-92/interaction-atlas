<!-- Favicon, decisione curatore 2026-07-08: monogramma tipografico "IA",
     Geist peso 550, colore ink su fondo bg (vedi tokens.css), nessun altro elemento grafico.
     Font sottoinsieme ai soli glifi I/A e incorporato: la favicon è un asset standalone,
     non ha accesso a public/fonts/ come il resto della pagina. -->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <style>
      @font-face {
        font-family: 'Geist Favicon';
        src: url(data:font/woff2;base64,) format('woff2');
        font-weight: 550;
      }
      text {
        font-family: 'Geist Favicon', sans-serif;
        font-weight: 550;
      }
    </style>
  </defs>
  <rect width="32" height="32" fill="#F7F6F3" />
  <text x="16" y="22" text-anchor="middle" font-size="17" letter-spacing="-0.3" fill="#1E1B1C">IA</text>
</svg>
